<div>
    <div class="card">
        <h3>{{ goal.title }}</h3>
        <p>Progress: {{ store.goalProgress(goal) }}%</p>
        <div class="progress">
            <div class="bar" [style.width.%]="store.goalProgress(goal)"></div>
        </div>
        <ul>

            @for (task of goal.tasks; track task.id) {
            <li>
                <input type="checkbox" [checked]="task.completed" (change)="store.toggleTask(goal.id, task.id)">
                {{ task.title }}
            </li>
            }
        </ul>
        <app-add-task [goalId]="goal.id" />
    </div>
</div>
